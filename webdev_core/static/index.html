<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AERO-TWIN // Uncertainty-Aware Turbofan Digital Twin UI</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="/static/lucide.min.js"></script>
  
  <!-- React & ReactDOM -->
  <script src="/static/react.production.min.js"></script>
  <script src="/static/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone to compile JSX in browser -->
  <script src="/static/babel.min.js"></script>
  <script>
    Babel.registerPreset('custom-preset', {
      presets: [
        [Babel.availablePresets['env'], {}],
        [Babel.availablePresets['react'], { runtime: 'classic' }]
      ]
    });
  </script>

  
  <!-- Chart.js for degradation and cycle trends -->
  <script src="/static/chart.js"></script>
  
  <!-- Styling -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div id="root">
    <div class="initial-loader">
      <div class="spinner"></div>
      <h2>INITIALIZING DIGITAL TWIN HUD PIPELINE...</h2>
      <p>Loading aerospace telemetry models, uncertainty bounds, and explainability heatmaps</p>
    </div>
  </div>

  <!-- App Logic (React JSX) -->
  <script type="text/babel" data-presets="custom-preset" src="/static/app.jsx"></script>
  
</body>
</html>
